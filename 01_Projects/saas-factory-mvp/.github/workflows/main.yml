name: SaaS Factory MVP CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: 01_Projects/saas-factory-mvp/package-lock.json

    - name: Install dependencies
      run: npm ci
      working-directory: 01_Projects/saas-factory-mvp

    - name: Run tests
      run: npm test
      working-directory: 01_Projects/saas-factory-mvp

    - name: Build
      run: npm run build
      working-directory: 01_Projects/saas-factory-mvp
