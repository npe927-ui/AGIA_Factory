<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none" aria-label="MultiEntregas">
  <!-- Background -->
  <rect width="240" height="60" rx="6" fill="#0A1628"/>

  <!-- Icon mark: two forward-moving chevrons -->
  <g>
    <polyline points="10,12 26,30 10,48" stroke="#8BA3C4" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <polyline points="22,12 38,30 22,48" stroke="#00C2FF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Wordmark -->
  <text x="50" y="38" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="26" letter-spacing="-0.5" fill="#FFFFFF">Multi</text>
  <text x="113" y="38" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="300" font-size="26" letter-spacing="-0.5" fill="#00C2FF">Entregas</text>
</svg>
